<div class="grid gap-6 xl:grid-cols-[360px_1fr]">
  <p-card header="Create Message">
    <form [formGroup]="form" class="space-y-4" (ngSubmit)="submit()">
      <input pInputText class="w-full" formControlName="title" placeholder="Title" />
      <textarea pInputTextarea rows="6" class="w-full" formControlName="content" placeholder="Message"></textarea>
      <button pButton type="submit" label="Send" icon="pi pi-send" class="w-full"></button>
    </form>
  </p-card>

  <p-card header="My Threads">
    <div class="space-y-3">
      @for (thread of threads; track thread.id) {
        <div class="rounded-xl border border-slate-200 p-4">
          <div class="mb-2 flex items-center justify-between">
            <p class="font-semibold">{{ thread.title }}</p>
            <p-tag [value]="thread.status" [severity]="getTagSeverity(thread.status)"></p-tag>
          </div>
          <p class="text-sm text-slate-600">{{ thread.content }}</p>
          <p class="mt-2 text-xs text-emerald-700">{{ thread.response || 'No response yet.' }}</p>
        </div>
      }
    </div>
  </p-card>
</div>
