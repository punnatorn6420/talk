<p-toast></p-toast>

<div class="min-h-screen bg-slate-50">
  <div class="border-b border-slate-200 bg-white">
    <div
      class="mx-auto flex flex-col gap-4 px-6 py-4 md:flex-row md:items-center md:justify-between"
    >
      <div class="flex items-center gap-3">
        <button
          aria-label="Back to Messages"
          pButton
          type="button"
          icon="pi pi-arrow-left"
          class="p-button-text p-button-sm"
          (click)="goBack()"
        ></button>

        <div>
          <h1 class="text-2xl font-semibold text-slate-900">Broadcast Detail</h1>
          <p class="mt-1 text-sm text-slate-500">Read-only view for CEO broadcast</p>
        </div>
      </div>
    </div>
  </div>

  <div class="mx-auto space-y-6 px-6 py-6">
    @if (loading) {
      <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="py-16 text-center text-slate-500">Loading broadcast...</div>
      </div>
    } @else if (broadcast) {
      <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="mb-3 text-sm font-semibold text-slate-800">Message</div>

        <div
          class="content-html-view min-h-[120px] rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm leading-6 text-slate-800"
          [innerHTML]="broadcast.detail || '-'"
        ></div>
      </section>

      <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="mb-3 text-sm font-semibold text-slate-800">Attachments</div>

        @if (broadcast.attachments?.length) {
          <div class="space-y-2">
            @for (file of broadcast.attachments; track file.id) {
              <div
                class="flex items-center justify-between gap-3 rounded-xl border border-slate-200 bg-white px-3 py-2 transition hover:bg-slate-50"
              >
                <button
                  aria-label="Download broadcast attachment"
                  type="button"
                  class="flex min-w-0 flex-1 items-center text-left"
                  (click)="downloadAttachment(file)"
                >
                  <i class="pi pi-paperclip mr-2 shrink-0 text-slate-400"></i>
                  <span class="truncate text-sm font-medium text-slate-800">{{ file.fileName }}</span>
                </button>

                <button
                  aria-label="Download broadcast attachment"
                  pButton
                  type="button"
                  icon="pi pi-download"
                  class="p-button-text p-button-sm"
                  (click)="downloadAttachment(file)"
                ></button>
              </div>
            }
          </div>
        } @else {
          <div class="rounded-xl border border-dashed border-slate-300 p-6 text-sm text-slate-500">
            No attachments
          </div>
        }
      </section>
    } @else {
      <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="py-16 text-center text-slate-500">Broadcast detail is unavailable.</div>
      </div>
    }
  </div>
</div>
